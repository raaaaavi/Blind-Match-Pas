version: "3.9"

services:
  blindmatch-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: blindmatch-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123!"
    ports:
      - "1433:1433"
    volumes:
      - blindmatch-sqlserver-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  blindmatch-sqlserver-data:
